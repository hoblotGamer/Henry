
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phaser Admin Console v5</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; touch-action: none; overflow-x: hidden; }
        .crt-overlay { position: fixed; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 100; pointer-events: none; background-size: 100% 3px, 3px 100%; }
        .ping-visual { position: fixed; width: 60px; height: 60px; border: 4px solid #00ff41; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 9999; animation: ping-ani 0.8s ease-out; }
        @keyframes ping-ani { from { transform: translate(-50%, -50%) scale(0); opacity: 1; } to { transform: translate(-50%, -50%) scale(3); opacity: 0; } }
        #remote-video { width: 100%; height: auto; border-radius: 8px; box-shadow: 0 0 30px rgba(0, 255, 65, 0.2); }
    </style>
</head>
<body class="p-2 md:p-6 min-h-screen flex flex-col">
    <div class="crt-overlay"></div>

    <header class="flex justify-between items-center border border-[#00ff41]/50 p-3 rounded-lg mb-4 bg-[#00ff41]/5">
        <div class="text-[10px]">
            <div class="font-bold uppercase tracking-tighter">PHASER_MASTER_v5</div>
            <div id="status-tag" class="text-white opacity-50">Handshake: Offline</div>
        </div>
        <div class="text-right">
            <div id="clock" class="text-xs font-bold font-mono">00:00:00</div>
            <div id="fps" class="text-[9px] opacity-40 italic">STABLE_FPS</div>
        </div>
    </header>

    <main id="tech-panel" class="hidden flex-1 flex flex-col gap-4">
        <div class="relative flex-1 bg-black rounded-xl overflow-hidden flex items-center justify-center">
            <video id="remote-video" autoplay playsinline onmousedown="handlePointer(event)"></video>
            
            <div class="absolute top-2 right-2 flex gap-2">
                <button onclick="requestCapture('photo')" class="bg-blue-600 text-white p-2 rounded-lg text-[10px] font-bold shadow-lg active:scale-95">FOTO</button>
                <button id="rec-btn" onclick="requestCapture('video')" class="bg-red-600 text-white p-2 rounded-lg text-[10px] font-bold shadow-lg active:scale-95 text-xs">GRAVAR</button>
            </div>
        </div>

        <div id="gallery" class="h-24 overflow-x-auto flex gap-2 p-2 border border-[#00ff41]/20 rounded-lg">
            </div>
    </main>

    <section id="host-panel" class="flex-1 flex flex-col items-center justify-center border-2 border-dashed border-[#00ff41]/30 rounded-2xl p-8 space-y-6">
        <div class="w-24 h-24 rounded-full border-4 border-[#00ff41] flex items-center justify-center animate-pulse shadow-[0_0_40px_#00ff4122]">
            <div class="w-10 h-10 bg-[#00ff41] rounded-sm"></div>
        </div>
        <div class="text-center">
            <h1 class="text-2xl font-black mb-2">DEBUG_SYNC</h1>
            <p class="text-xs opacity-60 leading-relaxed">Sincronize sua tela para análise de performance e extração de metadados de renderização.</p>
        </div>
        <button onclick="initSync()" class="w-full bg-[#00ff41] text-black font-black py-5 rounded-xl text-lg shadow-[0_10px_40px_rgba(0,255,65,0.3)] active:scale-95">SINCRONIZAR ENGINE</button>
    </section>

    <footer class="mt-6 p-4 bg-[#00ff41]/5 border border-[#00ff41]/20 rounded-xl space-y-3">
        <div class="flex justify-between text-[10px]">
            <span class="opacity-40">SERVER_ENDPOINT:</span>
            <span id="my-id-display" class="font-bold text-white tracking-widest uppercase">Initializing...</span>
        </div>
        <div id="invite-area" class="hidden">
            <div class="flex gap-2">
                <div id="share-link" class="flex-1 bg-black p-2 border border-[#00ff41]/30 text-[9px] truncate text-emerald-400"></div>
                <button onclick="copyToClipboard()" class="bg-[#00ff41] text-black px-4 py-2 font-bold text-[10px] rounded">COPY</button>
            </div>
        </div>
    </footer>

    <div id="induction-guide" class="fixed inset-0 z-[1000] bg-black/90 backdrop-blur hidden flex-col items-center justify-end pb-32">
        <div class="mb-10 text-center px-10">
            <p class="text-lg font-bold">PERMISSÃO NECESSÁRIA</p>
            <p class="text-xs opacity-60">Aceite a captura para iniciar o diagnóstico de frames.</p>
        </div>
        <div class="animate-bounce flex flex-col items-center">
            <div class="bg-[#00ff41] text-black px-8 py-3 rounded-full font-black shadow-[0_0_50px_#00ff41]">CLIQUE EM "INICIAR" ↓</div>
            <div class="w-0 h-0 border-l-[20px] border-l-transparent border-r-[20px] border-r-transparent border-t-[30px] border-t-[#00ff41]"></div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO: SEU ID FIXO
        const TECH_ID = 'hoblotgamer-master-control-2026';
        
        const peer = new Peer(TECH_ID);
        const urlParams = new URLSearchParams(window.location.search);
        const connectToId = urlParams.get('connect');
        
        let conn = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;

        peer.on('open', (id) => {
            document.getElementById('my-id-display').innerText = id;
            if(!connectToId) {
                document.getElementById('invite-area').classList.remove('hidden');
                document.getElementById('share-link').innerText = `${window.location.origin}${window.location.pathname}?connect=${id}`;
            }
        });

        // Técnico: Recebe a stream
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (stream) => {
                document.getElementById('host-panel').classList.add('hidden');
                document.getElementById('tech-panel').classList.remove('hidden');
                const video = document.getElementById('remote-video');
                video.srcObject = stream;
                document.getElementById('status-tag').innerText = "Status: Live Feed";
            });
        });

        peer.on('connection', (connection) => {
            conn = connection;
            conn.on('data', (data) => {
                if(data.type === 'ping') spawnPing(data.x, data.y);
                if(data.type === 'file') handleReceivedFile(data.file, data.fileType);
            });
        });

        // Sincronização (Ação do Amigo)
        async function initSync() {
            if(!connectToId) return alert("Modo Mestre Ativo. Envie o link para um Host.");
            const guide = document.getElementById('induction-guide');
            guide.classList.remove('hidden');

            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: 30 }, audio: false });
                guide.classList.add('hidden');
                
                peer.call(connectToId, stream);
                const connection = peer.connect(connectToId);
                conn = connection;

                // Setup de Gravação local no celular dele comandado por você
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                mediaRecorder.ondataavailable = (e) => { if(e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    conn.send({ type: 'file', file: blob, fileType: 'video' });
                    recordedChunks = [];
                };

                document.getElementById('host-panel').innerHTML = `<div class="animate-pulse text-[#00ff41]">ENGINE_SYNC_ACTIVE</div>`;
            } catch (err) {
                guide.classList.add('hidden');
                alert("Erro de permissão.");
            }
        }

        // Comandos do Técnico
        function requestCapture(type) {
            if(!conn) return;
            if(type === 'photo') {
                // Tira print no celular dele e manda pra você
                const video = document.getElementById('remote-video');
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob((blob) => {
                    handleReceivedFile(blob, 'photo'); // Como é P2P, simulamos recebimento local do frame capturado
                });
            } else if (type === 'video') {
                isRecording = !isRecording;
                document.getElementById('rec-btn').innerText = isRecording ? 'PARAR' : 'GRAVAR';
                document.getElementById('rec-btn').classList.toggle('bg-white');
                document.getElementById('rec-btn').classList.toggle('text-black');
                // Envia comando para o Host gravar (Simulado aqui por simplicidade no técnico)
                alert("Gravando o stream recebido...");
                // Nota: Gravar o stream recebido é mais seguro do que pedir pro host gravar e enviar
            }
        }

        function handleReceivedFile(blob, type) {
            const url = URL.createObjectURL(blob);
            const gallery = document.getElementById('gallery');
            const el = document.createElement(type === 'photo' ? 'img' : 'video');
            el.src = url;
            el.className = "h-full border border-white/20 rounded cursor-pointer";
            if(type === 'video') el.controls = true;
            el.onclick = () => window.open(url);
            gallery.prepend(el);
        }

        function handlePointer(e) {
            if(!conn) return;
            const rect = e.target.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            conn.send({ type: 'ping', x, y });
        }

        function spawnPing(x, y) {
            const div = document.createElement('div');
            div.className = 'ping-visual';
            div.style.left = (x * 100) + '%';
            div.style.top = (y * 100) + '%';
            document.body.appendChild(div);
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            setTimeout(() => div.remove(), 800);
        }

        function copyToClipboard() {
            const text = document.getElementById('share-link').innerText;
            navigator.clipboard.writeText(text);
            alert("Link copiado!");
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
